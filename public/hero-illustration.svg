<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" width="1600" height="1200" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#020206"/>
      <stop offset="100%" stop-color="#060612"/>
    </linearGradient>
    <radialGradient id="floorGlow" cx="50%" cy="65%" r="40%">
      <stop offset="0%" stop-color="#0ea5ff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#0ea5ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="blueGloss" x1="0" x2="1">
      <stop offset="0%" stop-color="#76d0ff"/>
      <stop offset="100%" stop-color="#1fa0ff"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="b1" />
      <feMerge>
        <feMergeNode in="b1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="particleBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="p1" />
      <feMerge>
        <feMergeNode in="p1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Subtle neon particles -->
  <g opacity="0.9" filter="url(#particleBlur)" transform="translate(0, -20)">
    <circle cx="120" cy="140" r="6" fill="#0ea5ff" opacity="0.22"/>
    <circle cx="420" cy="80" r="5" fill="#7df0ff" opacity="0.16"/>
    <circle cx="860" cy="60" r="8" fill="#1fa0ff" opacity="0.14"/>
    <circle cx="1300" cy="160" r="5" fill="#7df0ff" opacity="0.12"/>
    <circle cx="300" cy="420" r="7" fill="#0ea5ff" opacity="0.18"/>
    <circle cx="1400" cy="520" r="6" fill="#1fa0ff" opacity="0.12"/>
    <circle cx="950" cy="300" r="10" fill="#81d8ff" opacity="0.1"/>
    <circle cx="200" cy="900" r="9" fill="#1fa0ff" opacity="0.08"/>
    <circle cx="1250" cy="900" r="7" fill="#67c8ff" opacity="0.08"/>
  </g>

  <!-- Floor glow under desk -->
  <ellipse cx="800" cy="760" rx="380" ry="80" fill="url(#floorGlow)" opacity="0.95" filter="url(#softGlow)"/>

  <!-- Floating UI panels -->
  <g transform="translate(980,120) scale(1.02)">
    <rect x="0" y="0" width="380" height="140" rx="14" fill="#041025" stroke="#0ea5ff" stroke-opacity="0.12"/>
    <rect x="16" y="18" width="140" height="22" rx="6" fill="#072033"/>
    <!-- bars -->
    <g transform="translate(20,56)">
      <rect x="0" y="24" width="18" height="32" rx="4" fill="#1fa0ff"/>
      <rect x="30" y="12" width="18" height="44" rx="4" fill="#3ad2ff"/>
      <rect x="60" y="4" width="18" height="52" rx="4" fill="#76d0ff"/>
      <rect x="90" y="18" width="18" height="38" rx="4" fill="#1fa0ff"/>
    </g>
  </g>

  <g transform="translate(1120,60) scale(0.9)">
    <rect x="0" y="0" width="220" height="110" rx="12" fill="#041025" stroke="#0ea5ff" stroke-opacity="0.12"/>
    <circle cx="40" cy="48" r="18" fill="#0ea5ff" opacity="0.95"/>
    <rect x="70" y="32" width="118" height="12" rx="6" fill="#07324a"/>
    <rect x="70" y="52" width="90" height="10" rx="6" fill="#072b42"/>
  </g>

  <!-- Desk -->
  <g transform="translate(260,640)">
    <rect x="0" y="0" width="1080" height="20" rx="8" fill="#08101a" opacity="0.9"/>
    <rect x="40" y="-120" width="1000" height="18" rx="6" fill="#06131a"/>
    <rect x="120" y="-200" width="840" height="14" rx="6" fill="#08151b"/>
  </g>

  <!-- Chair and student (stylized flat shapes) -->
  <g transform="translate(380,440)">
    <!-- chair back -->
    <rect x="-40" y="-60" width="180" height="220" rx="26" fill="#0f2740" stroke="#1b4b7a" stroke-width="2"/>
    <!-- seat -->
    <rect x="20" y="60" width="280" height="26" rx="8" fill="#0f2740"/>

    <!-- student body -->
    <!-- head -->
    <ellipse cx="220" cy="-18" rx="36" ry="44" fill="#ffe9d6"/>
    <!-- hair -->
    <path d="M195 -40 q40 -32 65 8 q-15 -6 -40 -2 q-20 4 -25 -4 z" fill="#0b2a4a"/>
    <!-- torso -->
    <rect x="170" y="10" width="90" height="110" rx="20" fill="#eaf7ff"/>
    <!-- arm reading -->
    <path d="M210 40 q40 20 80 10 q-20 10 -40 18" fill="#eaf7ff"/>
    <!-- legs -->
    <rect x="170" y="118" width="40" height="70" rx="12" fill="#0b2a4a"/>
    <rect x="220" y="118" width="40" height="70" rx="12" fill="#0b2a4a"/>
  </g>

  <!-- Books on desk -->
  <g transform="translate(760,560)">
    <rect x="0" y="40" width="180" height="22" rx="4" fill="#071826" stroke="#0ea5ff" stroke-width="2"/>
    <rect x="12" y="10" width="160" height="22" rx="4" fill="#092532" stroke="#3ad2ff" stroke-width="2"/>
    <rect x="28" y="-20" width="130" height="22" rx="4" fill="#071826" stroke="#76d0ff" stroke-width="2"/>
  </g>

  <!-- Small plant left -->
  <g transform="translate(520,680)">
    <rect x="-26" y="20" width="52" height="28" rx="6" fill="#06232b"/>
    <path d="M0 10 q-12 -18 -26 0 q26 -8 26 0 z" fill="#3ad2ff" opacity="0.95"/>
  </g>

  <!-- Plant right -->
  <g transform="translate(980,660)">
    <rect x="-26" y="24" width="52" height="34" rx="6" fill="#06232b"/>
    <path d="M0 6 q18 -36 36 -6 q-12 -24 -36 6 z" fill="#67c8ff" opacity="0.95"/>
    <path d="M0 -6 q-18 -36 -36 -6 q12 -24 36 6 z" fill="#1fa0ff" opacity="0.92"/>
  </g>

  <!-- Clock -->
  <g transform="translate(1320,160)">
    <circle cx="0" cy="0" r="36" fill="#041025" stroke="#1fa0ff" stroke-opacity="0.22"/>
    <rect x="-4" y="-20" width="6" height="18" rx="3" fill="#1fa0ff"/>
    <rect x="0" y="-2" width="24" height="6" rx="3" fill="#76d0ff" transform="rotate(40)"/>
  </g>

  <!-- Soft overlays removed -->

  <!-- subtle vignette -->
  <rect width="100%" height="100%" fill="black" opacity="0.08"/>
</svg>
